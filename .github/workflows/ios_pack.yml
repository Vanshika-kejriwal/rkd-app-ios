name: iOS TestFlight Build & Deploy

on:
  workflow_dispatch: # Allows you to manually click "Run workflow" from GitHub

jobs:
  build-and-deploy:
    name: 🎉 iOS Build & TestFlight Deploy
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_DEV_CERTIFICATE_BASE64: ${{ secrets.BUILD_DEV_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          # Paths for files
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          DEV_CERTIFICATE_PATH=$RUNNER_TEMP/build_dev_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode both signing certificates and the provisioning profile
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_DEV_CERTIFICATE_BASE64" | base64 --decode -o $DEV_CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Setup secure runner keychain database
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH

          # Import BOTH certificates into the runner keychain system
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import $DEV_CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Move provisioning profile to default Apple system directories
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fetch Flutter Dependencies
        run: flutter pub get

      - name: Build Official Signed IPA Container
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/Runner/ExportOptions.plist \
            --build-number=${{ github.run_number }} \
            -- \
            CODE_SIGN_STYLE="Manual" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="app store provision profile RKD" \
            DEVELOPMENT_TEAM="A843G3K53B"

      - name: Upload Signed Artifact to GitHub (For Manual Backup)
        uses: actions/upload-artifact@v4
        with:
          name: production-signed-ipa
          path: build/ios/ipa/*.ipa

      - name: Upload Binary Package Directly to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Use Apple's command-line verification engine to push the package straight to TestFlight
          xcrun altool --upload-app --type ios \
            -f build/ios/ipa/*.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
