name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          
      - run: flutter pub get

      # 1. REMOVED the manual 'pod repo update' step from here.
      # Flutter will run CocoaPods automatically during the build phase below.
      - name: Repair and Generate Flutter iOS Scaffolding
        run: flutter precache --ios

      - name: Build iOS Frameworks
        run: flutter build ios --release --no-codesign
        env:
          FLUTTER_SUPPRESS_ANALYTICS: "true"

      - name: Create Payload Directory
        run: mkdir Payload
        working-directory: build/ios/iphoneos

      - name: Move App to Payload
        run: mv Runner.app Payload/
        working-directory: build/ios/iphoneos

      - name: Zip output into IPA
        run: zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphoneos

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"